name: Company 24x7 Cycle

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  run-company-cycle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run hourly company cycle
        run: python3 scripts/company_cycle.py

      - name: Upload cycle report artifact
        uses: actions/upload-artifact@v4
        with:
          name: company-cycle-report
          path: backend/reports/latest.json
